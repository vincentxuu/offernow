# ============================================================
# 求職偏好設定檔
# 修改此檔案即可微調篩選條件與 LLM prompt，不需要動 .py 程式碼
# ============================================================

[user]
# 自我介紹，會出現在所有 LLM prompt 的開頭（篩選 + 分析用）
background = """
台灣後端工程師，有 Python 與 Node.js 開發經驗，
目前尋找後端/全端/AI 相關職位，偏好有 LLM/RAG 整合的工作。
"""

# 目標職位類型
target_roles = ["後端工程師", "全端工程師", "AI/ML 工程師", "資料工程師"]

# 偏好技術（加分）
preferred_tech = ["Python", "Node.js", "TypeScript", "Go"]

# 排除條件（職稱/技能只有這些時排除）
exclude_tech = ["PHP", "C#", ".NET"]

# 加分項目（出現時優先）
bonus_factors = ["AI", "LLM", "RAG", "遠端", "remote"]

# 薪資期望（僅供 LLM prompt 參考，不做硬性過濾）
salary_note = "無硬性限制，但期望月薪 70k+（台幣）"


# ============================================================
# 履歷資料（主要用於 Cover Letter 產生，填越完整效果越好）
# ============================================================

[resume]
# 姓名（求職信署名用）
name = ""

# 一句話自我定位（例如：「3 年經驗的後端工程師，專注 Python 與 AI 應用開發」）
headline = ""

# 總年資
years_of_experience = ""

# 學歷（可填多筆）
education = """
"""

# 工作經歷（建議列出 2-3 段最相關的，含公司、職稱、時間、主要成果）
# 範例：
#   - ABC 科技｜後端工程師｜2022-2024
#     負責 API 設計與微服務架構，用 Python/FastAPI 建構日處理 100 萬筆請求的系統
work_experience = """
"""

# 專案經歷（個人專案、開源貢獻、或公司重點專案）
# 範例：
#   - OfferNow：用 Python 打造的職缺爬蟲 + LLM 評分管線，整合 MCP Server
#   - xxx-bot：基於 LangChain + RAG 的客服機器人，準確率提升 40%
projects = """
"""

# 技術能力（比 preferred_tech 更完整的版本，分類列出）
# 範例：
#   語言：Python, TypeScript, Go
#   框架：FastAPI, NestJS, LangChain
#   資料庫：PostgreSQL, Redis, Elasticsearch
#   雲端：AWS (EC2, Lambda, S3), GCP (Cloud Run)
#   其他：Docker, Kubernetes, CI/CD, Git
skills_detail = """
"""

# 證照或認證（選填）
certifications = """
"""

# 個人特質或軟實力（選填，例如：跨部門溝通、帶領 3 人小組、英文流利）
soft_skills = """
"""


[filter]
# 額外職稱關鍵字（補充 filter.py 預設清單）
extra_title_keywords = []

# 額外技術關鍵字（補充 filter.py 預設清單）
extra_tech_keywords = []

# 額外排除關鍵字（補充 filter.py 預設清單）
extra_exclude_keywords = []

# LLM 評分時每筆描述截取長度（字元數，越長越準但越慢）
description_length = 800


[analyze]
# 分析報告的目標讀者視角（用於 LLM 洞察 prompt）
focus_note = "聚焦後端/AI 工程師相關技能，忽略設計、行銷、硬體類技能"


[cover_letter]
# 求職信預設語言（"zh-TW" 繁體中文 / "en" 英文）
language = "zh-TW"

# 求職信段落數（不含開頭稱呼與結尾署名）
paragraphs = 3

# 額外經歷或亮點（補充 background，讓求職信更具體）
# 例如：專案經驗、開源貢獻、特殊成就等
experience = """
"""
